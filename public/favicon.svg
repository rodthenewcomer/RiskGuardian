<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0B0B0F"/>

  <!-- Shield -->
  <path
    d="M16 3L5 7.5V16c0 6.075 4.667 10.8 11 13 6.333-2.2 11-6.925 11-13V7.5L16 3Z"
    fill="none"
    stroke="#A6FF4D"
    stroke-width="1.8"
    stroke-linejoin="round"
  />

  <!-- Chart line inside shield: dip then strong upward rally -->
  <polyline
    points="9,20 12,17 14,19 18,13 23,9"
    fill="none"
    stroke="#A6FF4D"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Arrow tip -->
  <polyline
    points="20.5,8.5 23,9 22.5,11.5"
    fill="none"
    stroke="#A6FF4D"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Green glow filter (subtle) -->
  <defs>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
